<style>
.herbag-booking-elegant *{
  box-sizing:border-box;
}
.herbag-booking-elegant{
  max-width:720px;
  margin:0 auto;
  padding:40px 20px;
}
.herbag-time-scroll{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin:24px 0;
}
.herbag-time-scroll button{
  width:142px;
  height:56px;
  border:1px solid #000;
  background:#fff;
  cursor:pointer;
}
.herbag-time-scroll button.past{
  display:none!important;
}
.herbag-main-btn{
  width:100%;
  height:60px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}
.herbag-confirmation-box{
  text-align:center;
  padding:48px 24px;
}
.herbag-confirmation-icon{
  font-size:42px;
  margin-bottom:18px;
}
</style>

<div class="herbag-booking-elegant">

<form id="herbagForm">

<input type="date" id="herbagDate" required>

<div class="herbag-time-scroll" id="timeScroll">
  <button type="button">09:00</button>
  <button type="button">10:00</button>
  <button type="button">11:00</button>
  <button type="button">12:00</button>
  <button type="button">13:00</button>
  <button type="button">14:00</button>
  <button type="button">15:00</button>
  <button type="button">16:00</button>
  <button type="button">17:00</button>
</div>

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone" required>

<button type="submit" class="herbag-main-btn">
  <span>Book Appointment</span>
</button>

</form>

<div id="herbagStep3"></div>

</div>

<script>
(function(){

const dateInput=document.getElementById("herbagDate");
const timeScroll=document.getElementById("timeScroll");
const form=document.getElementById("herbagForm");

let selectedTime="";

function formatLocalDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+d;
}

function isPastTimeSlot(dateValue,timeValue){
  if(!dateValue||!timeValue) return false;
  const now=new Date();
  const selected=new Date(dateValue+"T"+timeValue);
  return selected<now;
}

function updatePastTimeSlots(){
  const today=formatLocalDate(new Date());

  timeScroll.querySelectorAll("button").forEach(function(btn){

    btn.classList.remove("past");

    if(dateInput.value===today){

      const time=btn.innerText.trim();
      const selected=new Date(today+"T"+time);

      if(selected<new Date()){
        btn.classList.add("past");
      }

    }

  });
}

dateInput.min=formatLocalDate(new Date());

dateInput.addEventListener("change",function(){

  updatePastTimeSlots();

});

timeScroll.querySelectorAll("button").forEach(function(btn){

  btn.addEventListener("click",function(){

    selectedTime=btn.innerText.trim();

    timeScroll.querySelectorAll("button").forEach(function(b){
      b.style.background="#fff";
      b.style.color="#000";
    });

    btn.style.background="#000";
    btn.style.color="#fff";

  });

});

form.addEventListener("submit",function(e){

  e.preventDefault();

  if(isPastTimeSlot(dateInput.value,selectedTime)){
    alert("Please select a future time.");
    return;
  }

  const name=form.name.value;

  document.getElementById("herbagStep3").innerHTML=`
    <div class="herbag-confirmation-box">
      <div class="herbag-confirmation-icon">✓</div>
      <h3>Appointment Request Received</h3>
      <p>Thank you ${name}, your appointment request has been received.</p>
      <div>${dateInput.value} · ${selectedTime}</div>
    </div>
  `;

  form.style.display="none";

});

updatePastTimeSlots();

setInterval(function(){
  updatePastTimeSlots();
},60000);

})();
</script>
